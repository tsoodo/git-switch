name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.22.2'
    
    - name: Build for macOS (Intel)
      run: GOOS=darwin GOARCH=amd64 go build -o gs-darwin-amd64 main.go
    
    - name: Build for macOS (Apple Silicon)  
      run: GOOS=darwin GOARCH=arm64 go build -o gs-darwin-arm64 main.go
    
    - name: Build for Linux (Intel)
      run: GOOS=linux GOARCH=amd64 go build -o gs-linux-amd64 main.go
    
    - name: Build for Linux (ARM)
      run: GOOS=linux GOARCH=arm64 go build -o gs-linux-arm64 main.go
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          gs-darwin-amd64
          gs-darwin-arm64
          gs-linux-amd64
          gs-linux-arm64
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
